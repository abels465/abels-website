<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>abels website</title>
  <link rel="icon" type="image/png" href="/assets/abels_website_icon.png" />
</head>

<body>
  <div class="header">
    <h1>Abel's Website</h1>
  </div>
  <div class="body">
    <div class="summary">
      <p>I will put cool apps here.</p>
      <p>Your browser needs to support WebGPU.</p>
      <p>Touch input is not supported yet...</p>
    </div>
    <div class="container">
      <div class="box">
        <a href="src/mandelbrot.html">
          <span class="item">Fractal Explorer</span>
          <img src="assets/fractal-explorer.jpg" alt="Mandelbrot">
        </a>
      </div>
      <div class="box">
        <a href="src/blop5.html">
          <span class="item">Kiwijam 2025 - Blop5</span>
          <img src="assets/blop5.jpg" alt="Blop5">
        </a>
      </div>
    </div>
  </div>

<style>
  html {
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: #777777;
  }

  a {
    text-decoration: none;
    color: black;
  }

  .box {
    width: 300px;
  }

  .summary {
    border: 2px solid #000000;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
    margin: 10px;
    margin-bottom: 33px;
    background-color: #aaaaaa;
  }

  /* mobile device */
  @media (pointer: coarse) {
    .box {
      width: calc(100% - 20px);
      color: #000;
      font-size: 66px;
    }

    .summary {
      font-size: 26px;
    }

    .header {
      font-size: 62px;
      text-align: center;
    }
  }

  .box img {
    width: 100%;
    border-radius: 10px;
  }

  .box p {
    margin: 0 0 4px 0;
  }

  .header {
    background-color: #999999;
    border-bottom: solid;
    padding: 10px;
    text-align: center;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    margin: 10px;
    gap: 33px;
  }

  .body {
    max-width: 999px;
    margin: auto;
  }

  .item {
    font-weight: 1000;
    height: 40px;
    font-size: 26px;
    color: #fff;
    margin: 20px;
    margin-top: 200px;
    text-align: center;
    display: block;
    position: absolute;
    -webkit-text-stroke: 1px #555;
  }
</style>

</html>
