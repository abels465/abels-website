<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>abels website</title>
  <link rel="icon" type="image/png" href="/assets/abels_website_icon.png" />
</head>

<body>
  <div class="header">
    <h1>Abels Website</h1>
  </div>
  <div class="body">
    <div class="summary">
      <p>Welcome to my website.</p>
      <p>Please enjoy these creations.</p>
    </div>
    <div class="container">
      <div class="box">
        <a href="src/mandelbrot.html">
          <img src="assets/fractal-explorer.jpg" alt="Mandelbrot">
          <span class="box-label fractal-explorer">Fractal Explorer</span>
        </a>
      </div>
      <div class="box">
        <a href="src/blop5.html">
          <img src="assets/blop5.jpg" alt="Blop5">
          <span class="box-label">Kiwijam 2025 - Blop5</span>
        </a>
      </div>
      <div class="box">
        <a href="src/mandelbox.html">
          <img src="assets/mandelbox.jpg" alt="Mandelbox">
          <span class="box-label">Mandelbox</span>
        </a>
      </div>
    </div>
  </div>
</body>
<style>
  html {
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: #777777;
  }

  a {
    text-decoration: none;
    color: black;
  }

  .box {
    width: 300px;
  }

  .summary {
    border: 2px solid #000000;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
    margin: 10px;
    margin-bottom: 33px;
    background-color: #aaaaaa;
  }

  .box img {
    width: 100%;
    border-radius: 10px;
  }

  .box p {
    margin: 0 0 4px 0;
  }

  .header {
    background-color: #999999;
    border-bottom: solid;
    padding: 10px;
    text-align: center;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    margin: 10px;
    gap: 33px;
  }

  .body {
    max-width: 999px;
    margin: auto;
  }

  .box-label {
    font-weight: 700;
    height: 40px;
    font-size: 26px;
    color: #fff;
    margin-top: -42px;
    margin-left: 20px;
    text-align: center;
    display: block;
    position: absolute;
  }

  /* mobile device */
  @media (pointer: coarse) {
    .box {
      width: 100vw;
      color: #000;
      font-size: 66px;
    }

    .summary {
      font-size: 26px;
    }

    .header {
      font-size: 62px;
      text-align: center;
    }

    .container {
      gap: 18px;
    }

    .box-label {
      font-size: 82px;
      margin-top: -140px;
      margin-left: 90px;
      display: block;
      position: absolute;
    }

    .fractal-explorer {
      margin-left: 110px;
    }
  }

</style>

</html>
